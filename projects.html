<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | FinSaathi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: rgba(255, 255, 255, 0.03);
            --accent-color: #729e84;
            --text-main: #ffffff;
            --text-muted: #888888;
            --transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Noise Texture Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05;
            pointer-events: none;
            z-index: 1000;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 40px;
        }

        header {
            margin-bottom: 80px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.04em;
        }

        h1 span {
            color: var(--accent-color);
            font-style: italic;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-bottom: 1px solid transparent;
            transition: var(--transition);
            margin-bottom: 15px;
            display: inline-block;
        }

        .back-btn:hover {
            color: var(--text-main);
            border-bottom: 1px solid var(--accent-color);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            perspective: 1000px;
        }

        .project-card {
            position: relative;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 24px;
            height: 400px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            text-decoration: none;
            color: inherit;
            transition: var(--transition);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transform-style: preserve-3d;
        }

        .project-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--accent-color);
            transform: translateY(-10px) rotateX(2deg) rotateY(2deg);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
        }

        .project-card::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at var(--x) var(--y), rgba(114, 158, 132, 0.15), transparent 40%);
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .project-card:hover::after {
            opacity: 1;
        }

        .project-info {
            position: relative;
            z-index: 2;
        }

        .project-number {
            font-size: 0.8rem;
            color: var(--accent-color);
            margin-bottom: 10px;
            display: block;
        }

        .project-name {
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: -0.02em;
            margin-bottom: 15px;
            text-transform: capitalize;
        }

        .project-tags {
            display: flex;
            gap: 10px;
            opacity: 0.6;
            font-size: 0.8rem;
        }

        .project-link-hint {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--accent-color);
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
        }

        .project-card:hover .project-link-hint {
            opacity: 1;
            transform: translateY(0);
        }

        /* Floating Interactive Preview */
        #hover-preview {
            position: fixed;
            width: 480px;
            height: 300px;
            background: #111;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            pointer-events: none;
            opacity: 0;
            z-index: 10000;
            transition: opacity 0.4s cubic-bezier(0.23, 1, 0.32, 1), transform 0.1s linear;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #hover-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(0.5);
            transform-origin: 0 0;
            width: 200%;
            height: 200%;
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            pointer-events: none;
        }

        footer {
            margin-top: 100px;
            text-align: center;
            color: var(--text-muted);
            padding-bottom: 40px;
        }

        @media (max-width: 768px) {
            .projects-grid {
                grid-template-columns: 1fr;
            }
            #hover-preview {
                display: none !important;
            }
        }
    </style>
</head>
<body>
    <div id="hover-preview">
        <div class="preview-overlay"></div>
        <iframe src="" frameborder="0"></iframe>
    </div>

    <div class="container">
        <a href="index.html" class="back-btn">← Back Home</a>
        <header>
            <div>
                <h1>Selected <span>Projects</span></h1>
                <p style="color: var(--text-muted); margin-top: 10px;">A collection of modern web experiences.</p>
            </div>
            <div style="text-align: right; font-size: 0.9rem; color: var(--accent-color);">
                VERIFIED BY FINSAATHI<br>
                ©2026
            </div>
        </header>

        <div class="projects-grid" id="projects-list">
            <!-- Projects will be injected here -->
        </div>

        <footer>
            <p>©2026 FinSaathi Team • Crafted with passion</p>
        </footer>
    </div>

    <script>
        const projects = [
            {"name": "Think Forward", "link": "https://thinkforwardsummit.framer.website/", "tags": ["Hackathon", "Conference"]},
            {"name": "RareU Clothing", "link": "https://rareu.in/", "tags": ["E-commerce", "Fashion"]},
            {"name": "Brothers Events", "link": "https://brothersevents.in/", "tags": ["Event Planner", "Luxury"]},
            {"name": "Pagani Automotive", "link": "https://starlit-faun-29fba1.netlify.app", "tags": ["Automotive", "Showcase"]},
            {"name": "Orange Vision", "link": "https://lighthearted-conkies-6bf67a.netlify.app/", "tags": ["Agency", "Modern"]},
            {"name": "Lotus Design", "link": "https://vocal-taffy-076d68.netlify.app/", "tags": ["Interior", "Architecture"]},
            {"name": "Noble Dry Fruits", "link": "https://noble-dry-fruits.netlify.app/", "tags": ["Product", "Minimal"]},
            {"name": "Wedding Suite", "link": "https://bespoke-wedding-suite.vercel.app/", "tags": ["Lifestyle", "Luxury"]},
            {"name": "Uday Shadi", "link": "https://uday-shadi.netlify.app/", "tags": ["Wedding", "Portal"]},
            {"name": "Vento Internship", "link": "https://hack-vento-2-k26-toer.vercel.app/", "tags": ["Platform", "Hackathon"]},
            {"name": "Drone Tech", "link": "https://deft-syrniki-e62766.netlify.app", "tags": ["Aerospace", "Tech"]},
            {"name": "Turing NM", "link": "https://www.turingnm.com/", "tags": ["Computing", "Next Gen"]},
            {"name": "Travel Hub", "link": "https://effervescent-gingersnap-dfc9b4.netlify.app/", "tags": ["Travel", "Booking"]},
            {"name": "Travel Capsules", "link": "https://travel-pods.vercel.app", "tags": ["Hospitality", "Modern"]},
            {"name": "Palmer Agency", "link": "https://premium-agency-portfolio-xzero.netlify.app", "tags": ["Creative", "Studio"]},
            {"name": "PS Hotel", "link": "https://ps-hotel.vercel.app", "tags": ["Luxury", "Hotel"]},
            {"name": "Aura Hostel", "link": "https://hostprsel-aura-living.vercel.app/hostel", "tags": ["Living", "Modern"]},
            {"name": "StudyOS Battle", "link": "https://studyos-final-submission-production.up.railway.app/student/battle", "tags": ["EdTech", "Gamified"]},
            {"name": "Metaverse Sage", "link": "https://metaverse-sage-psi.vercel.app/", "tags": ["Web3", "Metaverse"]},
            {"name": "iPhone Doc", "link": "https://iphone-doc.vercel.app/", "tags": ["Retail", "Service"]},
            {"name": "Titan Gym", "link": "https://nextjs-ecommerce-typescript.vercel.app/", "tags": ["Fitness", "Store"]},
            {"name": "Smart-X Store", "link": "https://smart-x-front-end.vercel.app/", "tags": ["Tech", "Ecommerce"]}
        ];

        const list = document.getElementById('projects-list');
        const preview = document.getElementById('hover-preview');
        const iframe = preview.querySelector('iframe');

        projects.forEach((p, index) => {
            const card = document.createElement('a');
            card.className = 'project-card';
            card.href = p.link;
            card.target = '_blank';
            
            card.innerHTML = `
                <div class="project-info">
                    <span class="project-number">PROJECT ${String(index + 1).padStart(2, '0')}</span>
                    <h3 class="project-name">${p.name}</h3>
                    <div class="project-tags">
                        ${p.tags.map(t => `<span>#${t}</span>`).join('')}
                    </div>
                </div>
                <div class="project-link-hint">
                    VIEW LIVE PROJECT 
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </div>
            `;

            // Tilt and Mouse Reveal Effect
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                card.style.setProperty('--x', `${x}px`);
                card.style.setProperty('--y', `${y}px`);

                // Dynamic Floating Preview
                preview.style.opacity = '1';
                // Calculate position with offset and smoothing
                const targetX = e.clientX + 30;
                const targetY = e.clientY - 150;
                preview.style.transform = `translate(${targetX}px, ${targetY}px)`;
            });

            card.addEventListener('mouseenter', () => {
                iframe.src = p.link;
            });

            card.addEventListener('mouseleave', () => {
                preview.style.opacity = '0';
                card.style.transform = `translateY(0) rotateX(0) rotateY(0)`;
            });

            list.appendChild(card);
        });

        // Smooth Mouse Smoothing for Preview
        let mouseX = 0, mouseY = 0;
        let ballX = 0, ballY = 0;
        let speed = 0.15;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animate() {
            let distX = mouseX - ballX;
            let distY = mouseY - ballY;
            ballX = ballX + (distX * speed);
            ballY = ballY + (distY * speed);

            const targetX = ballX + 30;
            const targetY = ballY - 150;
            
            // Only update transform if preview is visible
            if (preview.style.opacity === '1') {
                preview.style.left = `0px`;
                preview.style.top = `0px`;
                preview.style.transform = `translate(${targetX}px, ${targetY}px)`;
            }
            
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
