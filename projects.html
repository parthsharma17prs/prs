<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Projects | FinSaathi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #121212;
            --accent: #729e84;
            --text: #fdfdfd;
            --text-muted: #888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 24px;
        }

        header {
            margin-bottom: 80px;
            text-align: center;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
        }

        .accent-text {
            color: var(--accent);
            font-style: italic;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .project-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
        }

        .project-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 30px;
            position: relative;
            text-decoration: none;
            color: inherit;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 250px;
        }

        .project-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, rgba(114, 158, 132, 0.1), transparent);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4), 0 0 20px rgba(114, 158, 132, 0.1);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-meta {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .project-number {
            font-size: 0.9rem;
            color: var(--accent);
            font-weight: 600;
        }

        .project-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-transform: capitalize;
        }

        .project-link {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 250px;
        }

        .preview-trigger {
            margin-top: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }

        .project-card:hover .preview-trigger {
            opacity: 1;
            color: var(--accent);
        }

        /* Hover Preview Window */
        .hover-preview {
            position: fixed;
            pointer-events: none;
            width: 400px;
            height: 250px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            z-index: 10001;
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hover-preview.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .hover-preview iframe {
            width: 100%;
            height: 100%;
            border: none;
            transform: scale(0.5);
            transform-origin: 0 0;
            width: 200%;
            height: 200%;
        }

        .back-btn {
            position: fixed;
            top: 30px;
            left: 30px;
            z-index: 100;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 30px;
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: var(--accent);
        }

        @media (max-width: 768px) {
            .project-grid {
                grid-template-columns: 1fr;
            }
            .hover-preview {
                display: none;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back Home</a>

    <div class="container">
        <header>
            <h1>Selected <span class="accent-text">Projects</span></h1>
            <p class="subtitle">A showcase of modern web experiences, from high-performance applications to creative landing pages.</p>
        </header>

        <div class="project-grid" id="projectGrid">
            <!-- Projects will be injected here -->
        </div>
    </div>

    <div id="hoverPreview" class="hover-preview">
        <iframe id="previewFrame" src="" scrolling="no"></iframe>
    </div>

    <script>
        const projects = [
            {"name": "hackathon", "link": "http://thinkforwardsummit.framer.website/"},
            {"name": "Clothing", "link": "https://rareu.in/"},
            {"name": "event", "link": "https://brothersevents.in/"},
            {"name": "Pagani", "link": "https://starlit-faun-29fba1.netlify.app"},
            {"name": "orange", "link": "https://lighthearted-conkies-6bf67a.netlify.app/"},
            {"name": "lotus", "link": "https://vocal-taffy-076d68.netlify.app/"},
            {"name": "noble", "link": "https://noble-dry-fruits.netlify.app/"},
            {"name": "shadi", "link": "https://bespoke-wedding-suite.vercel.app/"},
            {"name": "shadi (alt)", "link": "https://uday-shadi.netlify.app/"},
            {"name": "internship", "link": "https://hack-vento-2-k26-toer.vercel.app/"},
            {"name": "drone", "link": "https://deft-syrniki-e62766.netlify.app"},
            {"name": "Turing", "link": "https://www.turingnm.com/"},
            {"name": "Travel", "link": "https://effervescent-gingersnap-dfc9b4.netlify.app/"},
            {"name": "Capsules", "link": "https://travel-pods.vercel.app"},
            {"name": "palmer", "link": "https://premium-agency-portfolio-xzero.netlify.app"},
            {"name": "hotel", "link": "https://ps-hotel.vercel.app"},
            {"name": "hostel", "link": "https://hostprsel-aura-living.vercel.app/hostel"},
            {"name": "studyos", "link": "https://studyos-final-submission-production.up.railway.app/student/battle"}
        ];

        const grid = document.getElementById('projectGrid');
        const preview = document.getElementById('hoverPreview');
        const frame = document.getElementById('previewFrame');

        projects.forEach((p, index) => {
            const card = document.createElement('a');
            card.href = p.link;
            card.target = "_blank";
            card.className = 'project-card';
            card.innerHTML = `
                <div class="project-meta">
                    <span class="project-number">0${index + 1}</span>
                    <div class="project-link">${p.link.replace('https://', '').replace('http://', '')}</div>
                </div>
                <div>
                    <div class="project-name">${p.name}</div>
                </div>
                <div class="preview-trigger">
                    <span>Live Preview</span>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </div>
            `;

            card.addEventListener('mouseenter', (e) => {
                frame.src = p.link;
                preview.classList.add('active');
            });

            card.addEventListener('mousemove', (e) => {
                const x = e.clientX + 20;
                const y = e.clientY + 20;
                
                // Keep preview within bounds
                const winW = window.innerWidth;
                const winH = window.innerHeight;
                
                let posX = x;
                let posY = y;
                
                if (x + 400 > winW) posX = e.clientX - 420;
                if (y + 250 > winH) posY = e.clientY - 270;

                preview.style.left = `${posX}px`;
                preview.style.top = `${posY}px`;
            });

            card.addEventListener('mouseleave', () => {
                preview.classList.remove('active');
                // Don't reset src immediately to keep the exit animation smooth
            });

            grid.appendChild(card);
        });
    </script>
</body>
</html>
